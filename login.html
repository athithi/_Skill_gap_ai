<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ResumeAI — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
--bg: #F0FDF4;           /* Soft mint background */
--surface: #FFFFFF;      /* Pure white */
--border: #DCFCE7;       /* Light green border */
--accent: #22C55E;       /* Primary green */
--accent-d: #15803D;     /* Dark green */
--text: #052E16;         /* Deep green-black */
--muted: #166534;        /* Muted green */
--pink: #000000;         /* unused */

--fh: 'Space Grotesk', sans-serif;
--fb: 'Inter', sans-serif;
}

html,body{height:100%;}

body{
  font-family:var(--fb);
  background:var(--bg);
background-image:
  radial-gradient(ellipse 80% 60% at 15% 0%,   #bbf7d066 0%, transparent 55%),
  radial-gradient(ellipse 60% 50% at 90% 100%, #86efac55 0%, transparent 55%),
  radial-gradient(ellipse 40% 40% at 80% 10%,  #dcfce744 0%, transparent 50%);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  padding:24px 16px;
}

/* floating blobs */
body::before,body::after{
  content:'';position:fixed;border-radius:50%;pointer-events:none;z-index:0;
}
body::before{
  width:320px;height:320px;
  background:radial-gradient(circle,#ffb3cc33,transparent 70%);
  top:-80px;left:-80px;
  animation:drift1 12s ease-in-out infinite alternate;
}
body::after{
  width:260px;height:260px;
  background:radial-gradient(circle,#ffd6e844,transparent 70%);
  bottom:-60px;right:-60px;
  animation:drift2 14s ease-in-out infinite alternate;
}
@keyframes drift1{to{transform:translate(40px,30px);}}
@keyframes drift2{to{transform:translate(-30px,-40px);}}

/* ── logo mark ── */
.brand{
  display:flex;align-items:center;gap:10px;
  margin-bottom:32px;position:relative;z-index:1;
  animation:fadeDown .5s ease both;
}
.brand-logo{
  font-family:var(--fh);font-size:1.5rem;font-weight:700;
  color:var(--text);letter-spacing:-.3px;
}
.brand-logo em{color:var(--accent);font-style:normal;}
.brand-dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--accent);
  animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1;}50%{transform:scale(1.5);opacity:.6;}}

/* ── card ── */
.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:24px;
  padding:44px 40px 36px;
  width:100%;max-width:400px;
  box-shadow:
    0 4px 24px rgba(255,63,122,.08),
    0 1px 3px rgba(255,63,122,.06),
    inset 0 1px 0 rgba(255,255,255,.9);
  position:relative;z-index:1;
  animation:fadeUp .5s ease both .1s;
}

/* top accent stripe */
.card::before{
  content:'';
  position:absolute;top:0;left:20px;right:20px;height:3px;
 background:linear-gradient(135deg,#22c55e,#4ade80);
  border-radius:0 0 3px 3px;
  opacity:.7;
}

@keyframes fadeUp{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeDown{from{opacity:0;transform:translateY(-10px);}to{opacity:1;transform:translateY(0);}}

/* ── headings ── */
.card-title{
  font-family:var(--fh);font-size:1.6rem;font-weight:700;
  color:var(--text);letter-spacing:-.5px;
  margin-bottom:6px;
}
.card-sub{
  font-family:var(--fb);font-size:.875rem;
  color:var(--muted);font-weight:400;
  margin-bottom:30px;
  line-height:1.5;
}

/* ── error ── */
.error{
  display:flex;align-items:center;gap:8px;
  background:#fff5f5;border:1px solid #fca5a5;
  color:#c0392b;border-radius:10px;
  padding:10px 14px;font-size:.82rem;font-weight:500;
  margin-bottom:20px;
  animation:shake .3s ease;
}
.error::before{content:'⚠';font-size:.95rem;}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-5px);}75%{transform:translateX(5px);}}

/* ── fields ── */
.field{
  display:flex;flex-direction:column;gap:7px;
  margin-bottom:18px;
}
.field label{
  font-family:var(--fb);font-size:.72rem;font-weight:600;
  letter-spacing:.8px;text-transform:uppercase;
  color:var(--muted);
}
.input-wrap{
  position:relative;display:flex;align-items:center;
}
.input-icon{
  position:absolute;left:14px;
  font-size:1rem;color:var(--muted);
  pointer-events:none;transition:color .2s;
  line-height:1;
}
.field input{
  width:100%;
  padding:12px 14px 12px 40px;
  background:#fff8fb;
  border:1.5px solid var(--border);
  border-radius:11px;
  outline:none;
  font-family:var(--fb);font-size:.92rem;
  color:var(--text);
  transition:border-color .2s, box-shadow .2s, background .2s;
}
.field input::placeholder{color:#c0a0b0;font-weight:400;}
.field input:focus{
  border-color:var(--accent);
  background:#fff;
  box-shadow:0 0 0 3px rgba(255,63,122,.1);
}
.field:focus-within .input-icon{color:var(--accent);}

/* ── submit button ── */
.btn-submit{
  width:100%;padding:13px;
  background:linear-gradient(135deg,var(--accent),#ff6fa5);
  border:none;border-radius:12px;
  color:#fff;
  font-family:var(--fh);font-size:.95rem;font-weight:600;
  cursor:pointer;letter-spacing:.1px;
  transition:all .2s;
  display:flex;align-items:center;justify-content:center;gap:8px;
  margin-top:6px;
  box-shadow:0 4px 16px rgba(255,63,122,.3);
  position:relative;overflow:hidden;
}
.btn-submit::after{
  content:'';
  position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.15),transparent);
  pointer-events:none;
}
.btn-submit:hover{
  background:linear-gradient(135deg,var(--accent-d),var(--accent));
  transform:translateY(-1px);
  box-shadow:0 6px 22px rgba(255,63,122,.38);
}
.btn-submit:active{transform:translateY(0);box-shadow:0 3px 12px rgba(255,63,122,.25);}

/* ── footer ── */
.card-footer{
  margin-top:22px;padding-top:20px;
  border-top:1px solid var(--border);
  text-align:center;
}
.card-footer p{
  font-family:var(--fb);font-size:.78rem;
  color:var(--muted);line-height:1.6;
}

/* ── bottom tagline ── */
.tagline{
  margin-top:24px;
  font-family:var(--fb);font-size:.78rem;
  color:var(--muted);opacity:.7;
  text-align:center;
  position:relative;z-index:1;
  animation:fadeUp .5s ease both .25s;
}

/* ── responsive ── */
@media(max-width:440px){
  .card{padding:36px 24px 28px;border-radius:20px;}
  .card-title{font-size:1.4rem;}
  .brand-logo{font-size:1.3rem;}
}
</style>
</head>
<body>

<div class="brand">
  <div class="brand-logo">Resume<em>AI</em></div>
  <div class="brand-dot"></div>
</div>

<div class="card">

  <h2 class="card-title">Welcome back</h2>
  <p class="card-sub">Sign in to analyse resumes and match skills.</p>

  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}

  <form method="POST" autocomplete="on">
    <div class="field">
      <label for="username">Username</label>
      <div class="input-wrap">
        <span class="input-icon">&#128100;</span>
        <input type="text" id="username" name="username" placeholder="Enter your username" required autocomplete="username">
      </div>
    </div>

    <div class="field">
      <label for="password">Password</label>
      <div class="input-wrap">
        <span class="input-icon">&#128274;</span>
        <input type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="current-password">
      </div>
    </div>

    <button type="submit" class="btn-submit">
      Sign In &#8594;
    </button>
  </form>

  <div class="card-footer">
    <p>Skill matching powered by BERT semantic analysis</p>
  </div>

</div>

<p class="tagline">ResumeAI &mdash; Semantic Skill Matcher</p>

</body>
</html>
